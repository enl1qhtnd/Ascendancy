name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.6.7)'
        required: true
        type: string
      release_name:
        description: 'Release title (defaults to tag)'
        required: false
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build IPA and Draft Release
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and test (simulator)
        run: |
          xcodebuild test \
            -project Ascendancy.xcodeproj \
            -scheme Ascendancy \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build IPA (device, unsigned)
        run: |
          xcodebuild build \
            -project Ascendancy.xcodeproj \
            -scheme Ascendancy \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          MARKETING_VERSION=$(grep "MARKETING_VERSION:" project.yml | sed 's/.*"\(.*\)".*/\1/')
          BUILD_VERSION=$(grep "CURRENT_PROJECT_VERSION:" project.yml | sed 's/.*"\(.*\)".*/\1/')
          IPA_NAME="Ascendancy_v${MARKETING_VERSION}_b${BUILD_VERSION}.ipa"

          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)

          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/

          cd build/ipa
          zip -r "$IPA_NAME" Payload
          cd ../..

          mv "build/ipa/$IPA_NAME" "build/$IPA_NAME"

          echo "IPA_NAME=${IPA_NAME}" >> $GITHUB_ENV
          echo "IPA_PATH=build/${IPA_NAME}" >> $GITHUB_ENV

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ inputs.release_name }}"
          if [ -z "$TITLE" ]; then
            TITLE="${{ inputs.tag }}"
          fi

          NOTES="${{ inputs.notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Unsigned sideload IPA. Install via AltStore, Sideloadly, or similar."
          fi

          gh release create "${{ inputs.tag }}" \
            --draft \
            --title "$TITLE" \
            --notes "$NOTES" \
            "${{ env.IPA_PATH }}"
