name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Ascendancy
        run: |
          xcodebuild build \
            -project Ascendancy.xcodeproj \
            -scheme Ascendancy \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project Ascendancy.xcodeproj \
            -scheme Ascendancy \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build and package IPA
        run: |
          # Build for device (ad-hoc without signing)
          xcodebuild build \
            -project Ascendancy.xcodeproj \
            -scheme Ascendancy \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # Get version info from project.yml
          MARKETING_VERSION=$(grep "MARKETING_VERSION:" project.yml | sed 's/.*"\(.*\)".*/\1/')
          BUILD_VERSION=$(grep "CURRENT_PROJECT_VERSION:" project.yml | sed 's/.*"\(.*\)".*/\1/')
          IPA_NAME="Ascendancy_v${MARKETING_VERSION}_b${BUILD_VERSION}.ipa"

          # Find the .app bundle
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)

          # Create Payload directory structure for IPA
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/

          # Create the IPA (which is just a zip file)
          cd build/ipa
          zip -r "$IPA_NAME" Payload
          cd ../..

          # Move IPA to a clean location
          mv "build/ipa/$IPA_NAME" "build/$IPA_NAME"

          echo "IPA_NAME=${IPA_NAME}" >> $GITHUB_ENV

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_NAME }}
          path: build/${{ env.IPA_NAME }}
          retention-days: 30
