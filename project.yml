name: Ascendancy
options:
  bundleIdPrefix: de.enl1qhtnd
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions:
    - Base
    - en
    - de
    - es
    - fr
    - it
    - ja
    - ko
    - zh-Hans
    - zh-Hant
    - pt-BR
    - ru
    - ar
    - hi
    - nl
    - pl
    - tr

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Ascendancy/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: de.enl1qhtnd.asce
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "6"
    ENABLE_PREVIEWS: YES

targets:
  Ascendancy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    # String catalogs must be in Copy Bundle Resources. XcodeGen’s top-level
    # `resources:` list is not applied to this target in practice; use explicit
    # `buildPhase: resources` entries (see XcodeGen “Custom build phases”).
    sources:
      - path: Ascendancy
        excludes:
          - "**/*.xcstrings"
      - path: Ascendancy/Localizable.xcstrings
        buildPhase: resources
      - path: Ascendancy/InfoPlist.xcstrings
        buildPhase: resources
    info:
      path: Ascendancy/Info.plist
      properties:
        CFBundleName: Ascendancy
        CFBundleDisplayName: Ascendancy
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHealthShareUsageDescription: "Ascendancy uses Apple Health to display your health metrics in one place."
        NSHealthUpdateUsageDescription: "Ascendancy may write health data to help track your progress."
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Ascendancy Backup
            LSHandlerRank: Owner
            LSItemContentTypes:
              - de.enl1qhtnd.asce.backup
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: de.enl1qhtnd.asce.backup
            UTTypeDescription: Ascendancy Backup
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - ascendancybackup
              public.mime-type:
                - application/json
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
    entitlements:
      path: Ascendancy/Ascendancy.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.developer.icloud-container-identifiers:
          - iCloud.de.enl1qhtnd.asce
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.de.enl1qhtnd.asce
    dependencies:
      - target: AscendancyWidget
        embed: true
      - sdk: HealthKit.framework
      - sdk: UserNotifications.framework
      - sdk: WidgetKit.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

  AscendancyWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AscendancyWidget
        excludes:
          - Info.plist
          - AscendancyWidget.entitlements
      - path: Ascendancy/Shared/AscendancyWidgetShared.swift
    info:
      path: AscendancyWidget/Info.plist
      properties:
        CFBundleDisplayName: Ascendancy
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: AscendancyWidget/AscendancyWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.de.enl1qhtnd.asce
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: de.enl1qhtnd.asce.widget
        INFOPLIST_FILE: AscendancyWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        APPLICATION_EXTENSION_API_ONLY: YES

  AscendancyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AscendancyTests
    dependencies:
      - target: Ascendancy
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: de.enl1qhtnd.asce.tests

schemes:
  Ascendancy:
    build:
      targets:
        Ascendancy: all
        AscendancyWidget: all
        AscendancyTests: testing
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AscendancyTests
