name: Ascendancy
options:
  bundleIdPrefix: de.enl1qhtnd
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Ascendancy/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: de.enl1qhtnd.asce
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"
    ENABLE_PREVIEWS: YES

targets:
  Ascendancy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Ascendancy
    info:
      path: Ascendancy/Info.plist
      properties:
        CFBundleName: Ascendancy
        CFBundleDisplayName: Ascendancy
        NSHealthShareUsageDescription: "Ascendancy uses Apple Health to display your health metrics in one place."
        NSHealthUpdateUsageDescription: "Ascendancy may write health data to help track your progress."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
    entitlements:
      path: Ascendancy/Ascendancy.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    dependencies:
      - sdk: HealthKit.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
