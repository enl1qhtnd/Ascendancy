name: Ascendancy
options:
  bundleIdPrefix: de.enl1qhtnd
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions:
    - Base
    - en
    - de
    - es
    - fr
    - it
    - ja
    - ko
    - zh-Hans
    - zh-Hant
    - pt-BR
    - ru
    - ar
    - hi
    - nl
    - pl
    - tr

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Ascendancy/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: de.enl1qhtnd.asce
    MARKETING_VERSION: "1.3"
    CURRENT_PROJECT_VERSION: "4"
    ENABLE_PREVIEWS: YES

targets:
  Ascendancy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    # String catalogs must be in Copy Bundle Resources. XcodeGen’s top-level
    # `resources:` list is not applied to this target in practice; use explicit
    # `buildPhase: resources` entries (see XcodeGen “Custom build phases”).
    sources:
      - path: Ascendancy
        excludes:
          - "**/*.xcstrings"
      - path: Ascendancy/Localizable.xcstrings
        buildPhase: resources
      - path: Ascendancy/InfoPlist.xcstrings
        buildPhase: resources
    info:
      path: Ascendancy/Info.plist
      properties:
        CFBundleName: Ascendancy
        CFBundleDisplayName: Ascendancy
        NSHealthShareUsageDescription: "Ascendancy uses Apple Health to display your health metrics in one place."
        NSHealthUpdateUsageDescription: "Ascendancy may write health data to help track your progress."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
    entitlements:
      path: Ascendancy/Ascendancy.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    dependencies:
      - sdk: HealthKit.framework
      - sdk: UserNotifications.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

schemes:
  Ascendancy:
    build:
      targets:
        Ascendancy: all
    run:
      config: Debug
